<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d6e15"/>
      <stop offset="60%" stop-color="#3a8a1e"/>
      <stop offset="100%" stop-color="#1a5f0a"/>
    </linearGradient>
    <!-- Sun gradient -->
    <radialGradient id="sunGrad" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fff3a0"/>
      <stop offset="60%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#e8a520"/>
    </radialGradient>
    <!-- Leaf gradient -->
    <linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9be851"/>
      <stop offset="100%" stop-color="#5cb33d"/>
    </linearGradient>
    <!-- Wheat gradient -->
    <linearGradient id="wheatGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d76e"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <!-- Field gradient -->
    <linearGradient id="fieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a9e2e"/>
      <stop offset="100%" stop-color="#2d6e15"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="200" height="200" rx="44" fill="url(#bgGrad)"/>

  <!-- Rising sun -->
  <circle cx="100" cy="75" r="28" fill="url(#sunGrad)" opacity="0.95"/>
  <!-- Sun rays -->
  <g stroke="#f5c842" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <line x1="100" y1="35" x2="100" y2="28"/>
    <line x1="72" y1="48" x2="67" y2="43"/>
    <line x1="128" y1="48" x2="133" y2="43"/>
    <line x1="60" y1="75" x2="53" y2="75"/>
    <line x1="140" y1="75" x2="147" y2="75"/>
  </g>

  <!-- Farmer silhouette (standing, proud) -->
  <g fill="#1a4a0a" opacity="0.85">
    <!-- Head -->
    <circle cx="100" cy="82" r="7"/>
    <!-- Body (torso) -->
    <path d="M93 88 L107 88 L110 115 L90 115 Z"/>
    <!-- Arms raised (holding plant up) -->
    <path d="M93 90 L82 72 L85 70 L95 88 Z"/>
    <path d="M107 90 L118 72 L115 70 L105 88 Z"/>
    <!-- Legs -->
    <path d="M94 115 L92 140 L97 140 L98 115 Z"/>
    <path d="M102 115 L103 140 L108 140 L106 115 Z"/>
  </g>

  <!-- Sprout/plant being held up -->
  <g>
    <!-- Stem -->
    <path d="M100 70 L100 55" stroke="url(#leafGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Left leaf -->
    <path d="M99 62 C92 58 86 52 84 46 C84 46 94 49 99 56 C100 58 100 60 99 62 Z" fill="url(#leafGrad)"/>
    <!-- Right leaf -->
    <path d="M101 60 C108 56 114 50 116 44 C116 44 106 47 101 54 C100 56 100 58 101 60 Z" fill="url(#leafGrad)"/>
    <!-- Top leaf -->
    <path d="M100 52 C97 48 94 44 93 40 C93 40 98 42 100 47 C101 49 101 51 100 52 Z" fill="url(#leafGrad)" opacity="0.9"/>
  </g>

  <!-- Wheat stalks (left side) -->
  <g>
    <line x1="55" y1="145" x2="52" y2="110" stroke="url(#wheatGrad)" stroke-width="2"/>
    <ellipse cx="51" cy="115" rx="2.5" ry="5" fill="url(#wheatGrad)" transform="rotate(-15 51 115)"/>
    <ellipse cx="53" cy="122" rx="2.5" ry="5" fill="url(#wheatGrad)" transform="rotate(-15 53 122)"/>
    <ellipse cx="52" cy="128" rx="2.5" ry="5" fill="url(#wheatGrad)" transform="rotate(-15 52 128)"/>
  </g>

  <!-- Wheat stalks (right side) -->
  <g>
    <line x1="145" y1="145" x2="148" y2="110" stroke="url(#wheatGrad)" stroke-width="2"/>
    <ellipse cx="149" cy="115" rx="2.5" ry="5" fill="url(#wheatGrad)" transform="rotate(15 149 115)"/>
    <ellipse cx="147" cy="122" rx="2.5" ry="5" fill="url(#wheatGrad)" transform="rotate(15 147 122)"/>
    <ellipse cx="148" cy="128" rx="2.5" ry="5" fill="url(#wheatGrad)" transform="rotate(15 148 128)"/>
  </g>

  <!-- Farmland fields (layered curves) -->
  <path d="M20 150 Q100 142 180 150 L180 170 Q100 162 20 170 Z" fill="url(#fieldGrad)" opacity="0.7"/>
  <path d="M20 160 Q100 153 180 160 L180 180 Q100 173 20 180 Z" fill="url(#fieldGrad)" opacity="0.5"/>

  <!-- Crop rows on field -->
  <g stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none">
    <path d="M30 155 Q100 149 170 155"/>
    <path d="M30 165 Q100 159 170 165"/>
    <path d="M30 175 Q100 169 170 175"/>
  </g>

  <!-- Small plants on field -->
  <g fill="url(#leafGrad)" opacity="0.6">
    <circle cx="45" cy="153" r="2"/>
    <circle cx="65" cy="151" r="2"/>
    <circle cx="135" cy="151" r="2"/>
    <circle cx="155" cy="153" r="2"/>
    <circle cx="55" cy="163" r="2"/>
    <circle cx="100" cy="161" r="2"/>
    <circle cx="145" cy="163" r="2"/>
  </g>
</svg>
